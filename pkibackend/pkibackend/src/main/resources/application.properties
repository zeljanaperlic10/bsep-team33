# Server
server.port=8443

# HTTPS
server.ssl.key-store=classpath:pki-https.jks
server.ssl.key-store-password=https123
server.ssl.key-store-type=JKS
server.ssl.key-alias=pki-https
server.ssl.enabled=true

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/pki_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=mojSuperTajniKljucKojiMoraBitiDugackiMinimum32Karaktera123456
jwt.expiration=86400000

# Keystore
keystore.path=keystores/
keystore.password=keystorePass123

# Logging
logging.level.com.pki=DEBUG
logging.file.name=logs/pki-app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
