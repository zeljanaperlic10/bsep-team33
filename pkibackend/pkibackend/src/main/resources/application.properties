spring.application.name=pkibackend
# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/pki_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=mojSuperTajniKljucKojiMoraBitiDugackiMinimum32Karaktera123456
jwt.expiration=86400000

# Keystore
keystore.path=keystores/
keystore.password=keystorePass123

# Logging
logging.level.com.pki=DEBUG
logging.file.name=logs/pki-app.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
